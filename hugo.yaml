baseURL: "https://e-ad420.github.io/Zhang_xinyi.github.io/"
title: "Xinyi Zhang"
locale: en-us
outputs:
  home: [HTML, RSS, JSON]
params:
  appearance:
    theme_day: custom
    theme_night: custom
    color_mode: light
    font: native
    font_size: L
  header:
    navbar:
      enable: true
      show_search: true
      logo:
        text: "XINYI ZHANG"
  features:
    search:
      provider: flexsearch
  extensions:
    css:
      - css/custom.css
taxonomies:
