    - name: Bio & C.V.
      url: /bio/
      weight: 10
    - name: Research Areas
      url: "/#research-areas"
      weight: 20
    - name: Publications
      url: /publication/
      weight: 30
    - name: Teaching
      url: /teaching/
      weight: 40
    - name: Projects
      url: /projects/
      weight: 50
    - name: Awards &amp; Service
      url: /awards/
      weight: 60
    - name: Contact
      url: /contact/
      weight: 70
