<header class="site-header">
  <div class="header-inner">
    <a href="{{ site.Home.RelPermalink }}" class="brand">XINYI ZHANG</a>
    <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>
    <nav class="nav-menu" role="navigation">
      <ul class="nav-list">
        {{ range site.Menus.main }}
        <li class="nav-item">
          <a href="{{ .URL }}" class="nav-link">{{ .Name | safeHTML }}</a>
        </li>
        {{ end }}
        <li class="nav-item nav-search">
          <button class="search-toggle" aria-label="Search" title="Search (Ctrl+K)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </li>
      </ul>
    </nav>
  </div>
</header>

<div class="search-overlay" hidden>
  <div class="search-modal">
    <div class="search-input-wrap">
      <input type="text" class="search-input" placeholder="Search...">
      <button class="search-close" aria-label="Close search">&times;</button>
    </div>
    <div class="search-results"></div>
    <div class="search-fallback" hidden>
      <p>Search with Google: <a href="#" class="google-search-link">site:zhangxinyi.com ...</a></p>
    </div>
  </div>
</div>

<script>
(function() {
  var hamburger = document.querySelector('.hamburger');
  var navMenu = document.querySelector('.nav-menu');
  var searchToggle = document.querySelector('.search-toggle');
  var searchOverlay = document.querySelector('.search-overlay');
  var searchClose = document.querySelector('.search-close');
  var searchInput = document.querySelector('.search-input');
  var searchResults = document.querySelector('.search-results');

  if (hamburger) {
    hamburger.addEventListener('click', function() {
      var expanded = hamburger.getAttribute('aria-expanded') === 'true';
      hamburger.setAttribute('aria-expanded', !expanded);
      navMenu.classList.toggle('is-open');
    });
  }

  if (searchToggle && searchOverlay) {
    searchToggle.addEventListener('click', function() {
      searchOverlay.hidden = false;
      searchInput.focus();
    });
    searchClose.addEventListener('click', function() {
      searchOverlay.hidden = true;
      if (searchResults) searchResults.innerHTML = '';
      if (searchInput) searchInput.value = '';
    });
    searchOverlay.addEventListener('click', function(e) {
      if (e.target === searchOverlay) {
        searchOverlay.hidden = true;
      }
    });
  }

  var pubPages = {{ (where site.RegularPages "Section" "publication") | jsonify | safeJS }};

  if (searchInput) {
    var timeout;
    searchInput.addEventListener('input', function() {
      clearTimeout(timeout);
      var q = searchInput.value.trim().toLowerCase();
      if (!q) { searchResults.innerHTML = ''; return; }
      timeout = setTimeout(function() {
        var results = pubPages.filter(function(p) {
          var text = (p.Title + ' ' + (p.Params.abstract || '') + ' ' + (p.Params.authors || []).join(' ')).toLowerCase();
          return text.indexOf(q) !== -1;
        });
        if (results.length) {
          searchResults.innerHTML = results.map(function(r) {
            return '<a href="' + r.RelPermalink + '" class="search-result-item"><strong>' + r.Title + '</strong><br><small>' + ((r.Params.authors || []).join(', ')) + '</small></a>';
          }).join('');
        } else {
          searchResults.innerHTML = '<p class="search-empty">No results found.</p>';
        }
      }, 200);
    });
  }

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      searchOverlay.hidden = false;
      searchInput.focus();
    }
    if (e.key === 'Escape' && !searchOverlay.hidden) {
      searchOverlay.hidden = true;
    }
  });
})();
</script>
